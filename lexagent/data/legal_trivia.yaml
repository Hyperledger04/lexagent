# Indian legal trivia — shown during setup wizard loading moments.
# Each entry has: fact (the trivia), category (for display), and fun (bool for emoji).
# Keep facts accurate, interesting, and Indian-law specific.

trivia:
  - fact: "The Supreme Court of India is the world's largest apex court by number of judges — it has 34 seats including the Chief Justice."
    category: "Supreme Court"
  - fact: "Article 32 of the Constitution is called the 'heart and soul' of the Constitution — as named by Dr. B.R. Ambedkar himself."
    category: "Constitution"
  - fact: "India's first Chief Justice was Harilal J. Kania, who served from 1950 to 1951."
    category: "History"
  - fact: "The Code of Civil Procedure, 1908 has survived two world wars, three constitutions, and infinite adjournments."
    category: "CPC"
  - fact: "India has over 50 million pending court cases — making it the world's largest judicial backlog. Your adjournment is statistically normal."
    category: "Judiciary"
  - fact: "The phrase 'Habeas Corpus' — literally 'you shall have the body' — dates to English law in the 14th century. It's been protecting liberty ever since."
    category: "Latin"
  - fact: "Nani Palkhivala argued the landmark Kesavananda Bharati case (1973) for 31 days straight. The resulting judgment ran to 703 pages."
    category: "Legends"
  - fact: "The Indian Penal Code was drafted by Lord Macaulay in 1860. It predates the Indian Constitution by 90 years."
    category: "History"
  - fact: "The Limitation Act, 1963 has exactly 32 articles in its Schedule. Article 65 is the most litigated — adverse possession suits."
    category: "Limitation"
  - fact: "Order XXXIX Rule 1 & 2 of the CPC governs temporary injunctions. It is the most invoked Order in Indian civil litigation."
    category: "CPC"
  - fact: "The right to be forgotten is not explicitly in the Indian Constitution — but courts have read it into Article 21's right to privacy."
    category: "Fundamental Rights"
  - fact: "The Specific Relief Act, 1963 was substantially amended in 2018 to make specific performance the rule, not the exception."
    category: "Contract Law"
  - fact: "India's legal system follows the common law tradition inherited from England — but with constitutional supremacy rather than parliamentary supremacy."
    category: "Legal System"
  - fact: "The phrase 'sub judice' means 'under a judge.' Using it correctly in court impresses even grumpy benches."
    category: "Latin"
  - fact: "Lok Adalats settled over 1 crore cases in a single year (2022-23) — the fastest dispute resolution mechanism in India."
    category: "ADR"
  - fact: "The Consumer Protection Act, 2019 introduced e-filing and video-conferencing hearings — before the pandemic made it fashionable."
    category: "Consumer Law"
  - fact: "Article 226 gives High Courts wider writ jurisdiction than Article 32 — they can issue writs for any legal right, not just fundamental rights."
    category: "Writs"
  - fact: "The Indian Evidence Act, 1872 was drafted by Sir James Fitzjames Stephen. Section 65B on electronic records has been litigated more than almost any other section."
    category: "Evidence"
  - fact: "A Sessions Court was called a 'Sessions Court' because it originally sat in 'sessions' — periodic sittings, not year-round. That changed, the name didn't."
    category: "History"
  - fact: "The principle of res judicata — 'the matter has been judged' — is codified in Section 11 CPC. It prevents the same parties from fighting the same fight twice."
    category: "Latin"
  - fact: "Vakalatnama literally means 'power of attorney' in Urdu. It is the document that lets an advocate speak on your behalf in court."
    category: "Practice"
  - fact: "India has 25 High Courts. Allahabad High Court is the largest by judge strength. Calcutta High Court is the oldest, established in 1862."
    category: "High Courts"
  - fact: "The Arbitration and Conciliation Act, 1996 was amended in 2015, 2019, and 2021 — each time to make arbitration faster. It's getting there."
    category: "ADR"
  - fact: "Section 498A IPC (cruelty by husband's relatives) is India's most-filed criminal provision by women. It is also the most challenged on misuse grounds."
    category: "Criminal"
  - fact: "The doctrine of prospective overruling was introduced in India by Justice K. Subba Rao in I.C. Golaknath v. State of Punjab (1967)."
    category: "Constitutional Law"
  - fact: "PIL (Public Interest Litigation) was pioneered in India by Justice P.N. Bhagwati and Justice V.R. Krishna Iyer in the late 1970s. India's own invention."
    category: "PIL"
  - fact: "The word 'attorney' in Indian law specifically means an 'attorney-at-law' enrolled with the Bombay High Court — different from an 'advocate' enrolled with the Bar Council."
    category: "Practice"
  - fact: "In Indian practice, a 'written statement' is what other countries call a 'defence.' You have 30 days to file one, extendable to 90. Time runs fast."
    category: "Practice"
  - fact: "The National Company Law Tribunal (NCLT) came into existence in 2016, replacing the Company Law Board, CLB, and BIFR in one stroke."
    category: "Corporate"
  - fact: "Section 138 of the Negotiable Instruments Act (cheque bounce) accounts for nearly 40% of all criminal cases pending in Indian courts. One cheque, infinite hearings."
    category: "NI Act"
